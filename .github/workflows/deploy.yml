name: Deploy Palist site to GitHub Pages

on:
  push:
    branches: [Basic_UI_showcase]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        env:
          BASE_PATH: /Palist/
          PORT: "5173"
          NODE_ENV: production
        run: pnpm --filter @workspace/syndicate-web run build

      - name: Add SPA fallback and disable Jekyll
        run: |
          cp artifacts/syndicate-web/dist/public/index.html artifacts/syndicate-web/dist/public/404.html
          touch artifacts/syndicate-web/dist/public/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/syndicate-web/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
