kind = "web"
previewPath = "/"
title = "Palestinian IT Syndicate"
version = "1.0.0"
id = "artifacts/syndicate-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20069

[services.development]
run = "pnpm --filter @workspace/syndicate-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/syndicate-web", "run", "build" ]
publicDir = "artifacts/syndicate-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20069"
BASE_PATH = "/"
