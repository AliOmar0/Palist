[build]
  base = "."
  command = "pnpm --filter @workspace/syndicate-web run build"
  publish = "artifacts/syndicate-web/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  NODE_ENV = "production"
  # Vite config requires both PORT and BASE_PATH at build time, even though
  # Netlify itself only uses the static build output.
  PORT = "5173"
  BASE_PATH = "/"

# Proxy API calls to the Replit-hosted API server so the deployed Netlify
# site can read news, jobs, newsletter, etc. without CORS or 404s.
#
# Replace the destination host with your actual Replit deployment URL
# (the one you got from Replit Publish — looks like `<name>.replit.app`).
# You can change it without redeploying by editing this file in GitHub.
[[redirects]]
  from = "/api/*"
  to = "https://palist.replit.app/api/:splat"
  status = 200
  force = true

# SPA fallback — every unknown path serves index.html so Wouter can route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
